<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel Admin — Consultório Inteligente</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-50 via-white to-fuchsia-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-xl border border-violet-100 p-8">
    <div class="text-center mb-6">
      <div class="w-14 h-14 mx-auto mb-3 rounded-2xl bg-gradient-to-br from-violet-600 to-fuchsia-600 flex items-center justify-center text-white text-2xl font-bold shadow">CI</div>
      <h1 class="text-xl font-bold text-gray-900">Painel Administrativo</h1>
      <p class="text-sm text-gray-500 mt-1">Consultório Inteligente</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Usuário ou e-mail</label>
        <input id="username" type="text" autocomplete="username" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input id="password" type="password" autocomplete="current-password" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-violet-500 focus:border-violet-500 outline-none">
      </div>
      <div id="erro" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg p-2"></div>
      <button type="submit" id="btn"
              class="w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:opacity-90 text-white font-semibold py-2.5 rounded-lg shadow transition">
        Entrar
      </button>
    </form>
    {% if erro %}<p class="mt-4 text-sm text-red-600 text-center">{{ erro }}</p>{% endif %}
  </div>

<script>
const form = document.getElementById('loginForm');
const erroBox = document.getElementById('erro');
const btn = document.getElementById('btn');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  erroBox.classList.add('hidden');
  btn.disabled = true; btn.textContent = 'Entrando…';
  try {
    const r = await fetch('/painel/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      throw new Error(j.detail || 'Falha no login.');
    }
    window.location.href = '/painel';
  } catch (err) {
    erroBox.textContent = err.message || 'Erro ao entrar.';
    erroBox.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
