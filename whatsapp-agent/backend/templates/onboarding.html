<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Configurar meu consultório — Agente WhatsApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: '#E91E8C' } } } }</script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-10">

<div class="w-full max-w-lg">

  <!-- Logo / título -->
  <div class="text-center mb-8">
    <div class="text-5xl mb-3">🤖</div>
    <h1 class="text-2xl font-bold text-gray-900">Agente de Atendimento WhatsApp</h1>
    <p class="text-gray-500 mt-2">Configure seu consultório em menos de 2 minutos</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8">

    <div id="form-section">
      <h2 class="text-lg font-semibold text-gray-800 mb-5">Dados do consultório</h2>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nome do consultório <span class="text-red-500">*</span></label>
          <input id="name" type="text" placeholder="Ex: Consultório Psicologia Bem Estar"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nome do(a) psicólogo(a) <span class="text-red-500">*</span></label>
          <input id="psy" type="text" placeholder="Ex: Ana Lima"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"/>
        </div>

        <!-- ── DADOS DE FATURAMENTO (obrigatórios) ───────────────────────────── -->
        <div class="pt-2 border-t border-gray-100">
          <h3 class="text-sm font-semibold text-gray-800 mb-3 mt-2">Dados de faturamento</h3>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nome completo do titular <span class="text-red-500">*</span></label>
          <input id="full_name" type="text" placeholder="Ex: Ana Lima Silva"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"/>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">E-mail <span class="text-red-500">*</span></label>
            <input id="email" type="email" placeholder="seu@email.com"
              class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp/Telefone <span class="text-red-500">*</span></label>
            <input id="phone" type="tel" placeholder="(11) 99999-9999"
              class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"/>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">CPF ou CNPJ <span class="text-red-500">*</span></label>
          <input id="cpf_cnpj" type="text" placeholder="000.000.000-00 ou 00.000.000/0000-00"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"/>
        </div>

        <div class="grid grid-cols-[1fr_2fr] gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">CEP <span class="text-red-500">*</span></label>
            <input id="zip" type="text" placeholder="00000-000" maxlength="9"
              class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"/>
            <p id="cep-status" class="text-xs text-gray-400 mt-1 hidden">Buscando...</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Endereço (rua/av.) <span class="text-red-500">*</span></label>
            <input id="addr" type="text" placeholder="Rua das Flores"
              class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"/>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Número <span class="text-red-500">*</span></label>
            <input id="num" type="text" placeholder="123"
              class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Complemento</label>
            <input id="compl" type="text" placeholder="Sala 4, Apto 12 (opcional)"
              class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"/>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Bairro <span class="text-red-500">*</span></label>
          <input id="neigh" type="text" placeholder="Centro"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"/>
        </div>

        <div class="grid grid-cols-[2fr_1fr] gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Cidade <span class="text-red-500">*</span></label>
            <input id="city" type="text" placeholder="São Paulo"
              class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">UF <span class="text-red-500">*</span></label>
            <input id="state" type="text" placeholder="SP" maxlength="2"
              class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm uppercase focus:outline-none focus:ring-2 focus:ring-brand"/>
          </div>
        </div>

        <!-- ── HORÁRIOS ──────────────────────────────────────────────────────── -->
        <div class="pt-2 border-t border-gray-100">
          <h3 class="text-sm font-semibold text-gray-800 mb-3 mt-2">Horário de atendimento</h3>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Atendimento início</label>
            <select id="start" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand">
              {% for h in range(6, 21) %}
              <option value="{{ h }}" {% if h == 8 %}selected{% endif %}>{{ '%02d'|format(h) }}:00</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Atendimento fim</label>
            <select id="end" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand">
              {% for h in range(10, 23) %}
              <option value="{{ h }}" {% if h == 18 %}selected{% endif %}>{{ '%02d'|format(h) }}:00</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Duração de cada sessão</label>
          <select id="minutes" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand">
            <option value="45">45 minutos</option>
            <option value="50" selected>50 minutos</option>
            <option value="60">60 minutos (1 hora)</option>
            <option value="90">90 minutos</option>
          </select>
        </div>

        <div class="flex items-start gap-3 pt-2 border-t border-gray-100">
          <input type="checkbox" id="accept_terms" class="mt-1 w-4 h-4 text-brand border-gray-300 rounded focus:ring-brand">
          <label for="accept_terms" class="text-sm text-gray-700 leading-relaxed">
            Li e aceito os <a href="/termos" target="_blank" class="text-brand font-medium hover:underline">Termos de Uso</a>
            e a <a href="/privacidade" target="_blank" class="text-brand font-medium hover:underline">Política de Privacidade</a>
            (LGPD). <span class="text-red-500">*</span>
          </label>
        </div>

        <div id="error-msg" class="hidden text-sm text-red-600 bg-red-50 rounded-xl px-4 py-2.5"></div>

        <button onclick="submit()" id="btn"
          class="w-full bg-brand text-white py-3 rounded-xl text-sm font-semibold hover:opacity-90 active:scale-95 transition mt-2">
          Criar meu agente →
        </button>
      </div>
    </div>

  </div>

  <p class="text-center text-xs text-gray-400 mt-6">Powered by Claude AI · Agente de Atendimento</p>
</div>

<script>
const v = (id) => document.getElementById(id).value.trim();

// Máscara CEP + ViaCEP autocomplete
const cepEl = document.getElementById("zip");
cepEl.addEventListener("input", (e) => {
  let s = e.target.value.replace(/\D/g, "").slice(0, 8);
  if (s.length > 5) s = s.slice(0,5) + "-" + s.slice(5);
  e.target.value = s;
});
cepEl.addEventListener("blur", async () => {
  const cep = cepEl.value.replace(/\D/g, "");
  if (cep.length !== 8) return;
  const status = document.getElementById("cep-status");
  status.textContent = "Buscando..."; status.classList.remove("hidden");
  try {
    const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    const d = await r.json();
    if (d.erro) { status.textContent = "CEP não encontrado"; return; }
    if (!document.getElementById("addr").value) document.getElementById("addr").value = d.logradouro || "";
    if (!document.getElementById("neigh").value) document.getElementById("neigh").value = d.bairro || "";
    if (!document.getElementById("city").value) document.getElementById("city").value = d.localidade || "";
    if (!document.getElementById("state").value) document.getElementById("state").value = (d.uf || "").toUpperCase();
    status.classList.add("hidden");
    document.getElementById("num").focus();
  } catch { status.textContent = "Falha ao buscar CEP"; }
});

// Máscara CPF/CNPJ
document.getElementById("cpf_cnpj").addEventListener("input", (e) => {
  let s = e.target.value.replace(/\D/g, "").slice(0, 14);
  if (s.length <= 11) {
    s = s.replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2");
  } else {
    s = s.replace(/^(\d{2})(\d)/, "$1.$2").replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3").replace(/\.(\d{3})(\d)/, ".$1/$2").replace(/(\d{4})(\d)/, "$1-$2");
  }
  e.target.value = s;
});

async function submit() {
  const payload = {
    name: v("name"),
    psychologist_name: v("psy"),
    full_name: v("full_name"),
    email: v("email"),
    phone: v("phone"),
    cpf_cnpj: v("cpf_cnpj"),
    billing_zip: v("zip"),
    billing_address: v("addr"),
    billing_number: v("num"),
    billing_complement: v("compl"),
    billing_neighborhood: v("neigh"),
    billing_city: v("city"),
    billing_state: v("state").toUpperCase(),
    working_hours_start: +document.getElementById("start").value,
    working_hours_end: +document.getElementById("end").value,
    session_minutes: +document.getElementById("minutes").value,
    accept_terms: document.getElementById("accept_terms").checked,
  };
  const errEl = document.getElementById("error-msg");
  const btn   = document.getElementById("btn");
  errEl.classList.add("hidden");

  const required = ["name","psychologist_name","full_name","email","phone","cpf_cnpj","billing_zip","billing_address","billing_number","billing_neighborhood","billing_city","billing_state"];
  for (const k of required) {
    if (!payload[k]) {
      errEl.textContent = "Preencha todos os campos obrigatórios marcados com *.";
      errEl.classList.remove("hidden");
      return;
    }
  }
  if (payload.working_hours_end <= payload.working_hours_start) {
    errEl.textContent = "O horário de fim deve ser depois do início.";
    errEl.classList.remove("hidden");
    return;
  }
  if (payload.billing_state.length !== 2) {
    errEl.textContent = "UF deve ter 2 letras (ex: SP).";
    errEl.classList.remove("hidden");
    return;
  }
  if (!payload.accept_terms) {
    errEl.textContent = "Você precisa aceitar os Termos de Uso e a Política de Privacidade.";
    errEl.classList.remove("hidden");
    return;
  }

  btn.textContent = "Criando...";
  btn.disabled = true;

  try {
    const r = await fetch("/onboarding/create", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || "Erro ao criar consultório.");
    window.location.href = `/onboarding/pagamento?token=${data.setup_token}`;
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.remove("hidden");
    btn.textContent = "Criar meu agente →";
    btn.disabled = false;
  }
}
</script>
</body>
</html>
