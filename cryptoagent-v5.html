<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CryptoAgent PRO v5</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Oswald:wght@500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080d;--bg1:#080c14;--bg2:#0b1019;
  --surface:#0f1620;--border:#1c2b3d;
  --accent:#00ffb3;--adim:rgba(0,255,179,.1);
  --blue:#3b82f6;--green:#10b981;--gb:#00e676;
  --red:#ef4444;--rb:#ff1744;
  --yellow:#f59e0b;--yb:#ffd600;
  --purple:#8b5cf6;
  --text:#dde6f0;--t2:#8fa8c0;--t3:#4a6b8a;
  --font:'DM Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --disp:'Oswald',sans-serif;
  --r:10px;--rs:6px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:500;background:rgba(5,8,13,.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 12px;height:50px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lbadge{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--blue));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.lname{font-family:var(--disp);font-size:1.05rem;letter-spacing:1.5px;white-space:nowrap}
.lname em{color:var(--accent);font-style:normal}
.lsub{font-size:.45rem;color:var(--t3);letter-spacing:2px;font-family:var(--mono)}
.tbr{display:flex;align-items:center;gap:6px;flex-shrink:0}
.lchip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;border:1px solid;font-family:var(--mono);font-size:.58rem;white-space:nowrap}
.lchip.real{border-color:rgba(0,230,118,.3);background:rgba(0,230,118,.06);color:var(--gb)}
.lchip.sim{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06);color:var(--yb)}
.pulse{width:5px;height:5px;border-radius:50%;animation:pls 1.2s infinite}
.pulse.g{background:var(--gb)}.pulse.y{background:var(--yb)}
@keyframes pls{0%,100%{opacity:1;box-shadow:0 0 0 0 currentColor}50%{opacity:.7;box-shadow:0 0 0 4px transparent}}
.cdbox{display:flex;flex-direction:column;align-items:center;min-width:22px}
.cdnum{font-family:var(--mono);font-size:.7rem;font-weight:700;color:var(--accent);line-height:1}
.cdlbl{font-family:var(--mono);font-size:.38rem;color:var(--t3);letter-spacing:.5px}
.bref{padding:4px 10px;border-radius:var(--rs);background:linear-gradient(135deg,var(--accent),var(--blue));border:none;color:#000;font-family:var(--mono);font-size:.6rem;font-weight:700;cursor:pointer}
.bref:disabled{opacity:.4}

/* TICKER */
.ticker{background:var(--bg1);border-bottom:1px solid var(--border);overflow:hidden;padding:4px 0}
.tinner{display:flex;gap:22px;white-space:nowrap;animation:tape 50s linear infinite}
@keyframes tape{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tit{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:.63rem}
.tsym{color:var(--accent);font-weight:700}
.up{color:var(--gb)}.dn{color:var(--rb)}

/* STATUS */
.sbar2{display:flex;align-items:center;justify-content:space-between;padding:3px 12px;background:var(--bg1);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:.56rem;color:var(--t3);gap:8px}
.sbar2 span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* TABS */
.tabs{display:grid;grid-template-columns:repeat(3,1fr);background:var(--bg1);border-bottom:1px solid var(--border)}
.tbtn{display:flex;flex-direction:column;align-items:center;padding:7px 2px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;gap:2px;transition:border-color .2s}
.tbtn.active{border-bottom-color:var(--accent)}
.tibadge{font-size:.5rem;font-family:var(--mono);font-weight:700;padding:1px 5px;border-radius:3px}
.ts-s{background:rgba(239,68,68,.12);color:var(--red)}
.ts-d{background:rgba(245,158,11,.12);color:var(--yellow)}
.ts-w{background:rgba(59,130,246,.12);color:var(--blue)}
.tlbl{font-size:.58rem;font-weight:700;letter-spacing:1px;color:var(--t3)}
.tbtn.active .tlbl{color:var(--accent)}
.tframes{font-size:.5rem;color:var(--t3);font-family:var(--mono)}
.tbtn.active .tframes{color:var(--t2)}

/* CONTROLS */
.ctrls{background:var(--bg1);border-bottom:1px solid var(--border);padding:7px 10px;display:flex;flex-direction:column;gap:5px}
.sw{position:relative}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px;pointer-events:none}
.sinput{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:7px 9px 7px 28px;color:var(--text);font-family:var(--mono);font-size:.7rem;outline:none}
.sinput:focus{border-color:var(--accent)}
.sinput::placeholder{color:var(--t3)}
.frow{display:flex;gap:4px;flex-wrap:wrap}
.fb{padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--t3);font-size:.58rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:3px;white-space:nowrap;font-family:var(--font)}
.fa{border-color:var(--accent)!important;color:var(--accent)!important;background:var(--adim)!important}
.fg{border-color:var(--green)!important;color:var(--green)!important;background:rgba(16,185,129,.07)!important}
.fr{border-color:var(--red)!important;color:var(--red)!important;background:rgba(239,68,68,.07)!important}
.fy{border-color:var(--yellow)!important;color:var(--yellow)!important;background:rgba(245,158,11,.07)!important}
.fp{border-color:var(--purple)!important;color:var(--purple)!important;background:rgba(139,92,246,.07)!important}
.d8{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dg{background:var(--green)}.dr{background:var(--red)}.dy{background:var(--yellow)}

/* SORT */
.srow{display:flex;gap:3px;padding:4px 10px;background:var(--bg1);border-bottom:1px solid var(--border);overflow-x:auto}
.srow::-webkit-scrollbar{height:0}
.sbtn{white-space:nowrap;padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:none;color:var(--t3);font-size:.56rem;font-family:var(--mono);cursor:pointer;flex-shrink:0}
.sbtn.sa{border-color:#0ff;color:#0ff;background:rgba(0,255,255,.05)}

/* STAT BAR */
.statbar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bg1);border-bottom:1px solid var(--border)}
.scell{padding:4px 0;text-align:center;border-right:1px solid var(--border)}
.scell:last-child{border-right:none}
.snum{font-family:var(--mono);font-size:.82rem;font-weight:700}
.slbl{font-size:.48rem;color:var(--t3);letter-spacing:.8px;margin-top:1px}

/* LIST */
.clist{overflow-y:auto;-webkit-overflow-scrolling:touch}
.crow{display:flex;align-items:center;gap:7px;padding:9px 10px;border-bottom:1px solid var(--border);cursor:pointer;active:background:var(--surface)}
.crow:active{background:var(--surface)}
.rank{font-family:var(--mono);font-size:.52rem;color:var(--t3);width:16px;text-align:center;flex-shrink:0}
.cico{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;font-family:var(--mono);flex-shrink:0}
.cinfo{flex:1;min-width:0}
.csym{font-weight:700;font-size:.84rem;line-height:1.2}
.cpair{font-family:var(--mono);font-size:.52rem;color:var(--t3);margin-top:1px}
.ctf{font-size:.5rem;color:var(--t2);font-family:var(--mono);margin-top:1px}
.csig{display:inline-block;font-size:.52rem;font-weight:800;padding:2px 6px;border-radius:3px;margin-top:2px;letter-spacing:.5px}
.scf{background:rgba(0,230,118,.15);color:#4ade80;border:1px solid rgba(0,230,118,.25)}
.scn{background:rgba(16,185,129,.08);color:#86efac;border:1px solid rgba(16,185,129,.15)}
.svf{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.svn{background:rgba(239,68,68,.08);color:#fca5a5;border:1px solid rgba(239,68,68,.15)}
.snn{background:rgba(245,158,11,.08);color:#fcd34d;border:1px solid rgba(245,158,11,.15)}
.cright{text-align:right;flex-shrink:0}
.cprice{font-family:var(--mono);font-size:.8rem;font-weight:700;line-height:1.2}
.cchg{font-family:var(--mono);font-size:.66rem;font-weight:700;margin-top:2px}
.cmeta{font-size:.5rem;color:var(--t3);margin-top:1px}
.led{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lg{background:var(--gb);box-shadow:0 0 5px var(--gb)}.lr{background:var(--rb);box-shadow:0 0 5px var(--rb)}.ly{background:var(--yb)}
.empty{text-align:center;padding:40px 20px;color:var(--t3);font-size:.75rem}

/* DETAIL PANEL */
.detail{position:fixed;inset:0;background:var(--bg);z-index:600;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.detail.open{transform:translateX(0)}
.dtop{display:flex;align-items:center;gap:9px;padding:9px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(5,8,13,.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:10}
.dback{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0}
.dback:active{opacity:.7}
.dsym{font-family:var(--disp);font-size:1.3rem;letter-spacing:2px}
.dpair{font-size:.52rem;color:var(--t3);font-family:var(--mono)}
.dbody{padding:10px}

/* Detail elements */
.dpr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px}
.dprice{font-family:var(--disp);font-size:1.8rem;letter-spacing:1px;line-height:1}
.dbadge{font-family:var(--mono);font-size:.75rem;font-weight:700;padding:3px 9px;border-radius:6px}
.dbadge.up{background:rgba(0,230,118,.15);color:var(--gb)}
.dbadge.dn{background:rgba(255,23,68,.15);color:var(--rb)}
.dtime{font-family:var(--mono);font-size:.52rem;color:var(--t3);margin-bottom:10px}
.sec{margin-bottom:10px}
.stit{font-size:.53rem;color:var(--accent);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.stit::after{content:'';flex:1;height:1px;background:var(--border)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px}
.cl{font-size:.48rem;color:var(--t3);letter-spacing:.8px;margin-bottom:2px}
.cv{font-family:var(--mono);font-size:.74rem;font-weight:700}
.lvw{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.lv{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-bottom:1px solid var(--border);font-size:.67rem}
.lv:last-child{border-bottom:none}
.lvn{color:var(--t3)}.lvv{font-family:var(--mono);font-weight:700}
.rsitrack{height:4px;background:var(--border);border-radius:3px;margin-top:4px;position:relative}
.rsifill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--yellow),var(--green))}
.rsipin{position:absolute;top:-4px;width:11px;height:11px;background:var(--text);border-radius:50%;border:2px solid var(--bg);transform:translateX(-50%)}
.tfgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.tfi{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:6px 3px;text-align:center}
.tfl{font-size:.48rem;color:var(--t3)}.tfv{font-size:.64rem;font-weight:700;margin-top:2px}
.riskbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:10px}
.riskbar{height:6px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));border-radius:4px;position:relative;margin:6px 0}
.riskpin{position:absolute;top:-5px;width:16px;height:16px;background:var(--text);border-radius:50%;border:3px solid var(--bg);transform:translateX(-50%);transition:left .5s}
.rrrow{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
.rrbig{font-family:var(--disp);font-size:1.7rem;line-height:1}
.rrsub{font-size:.48rem;color:var(--t3);margin-top:2px;font-family:var(--mono)}
.aicard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:10px}
.aihdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ait{font-size:.52rem;color:var(--accent);font-weight:700;letter-spacing:1.5px}
.aibadge{display:flex;align-items:center;gap:4px;background:var(--adim);border:1px solid rgba(0,255,179,.18);border-radius:20px;padding:2px 7px;font-size:.52rem;color:var(--accent)}
.aispin{width:6px;height:6px;border:1px solid rgba(0,255,179,.3);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.aisec{margin-bottom:7px}
.aisl{font-size:.5rem;color:var(--accent);font-weight:700;letter-spacing:1.5px;margin-bottom:3px}
.aitx{font-size:.65rem;line-height:1.7;color:#94a3b8}
.aitx strong{color:var(--text)}
.ptag{display:inline-flex;align-items:center;gap:3px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.22);color:#a78bfa;padding:2px 6px;border-radius:4px;font-size:.54rem;font-weight:700;margin:2px}
.confitem{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.confitem:last-child{border-bottom:none}
.confico{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.conft{font-size:.62rem;font-weight:700;margin-bottom:1px}
.confd{font-size:.57rem;color:var(--t3);line-height:1.5}
.warnbox{background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.14);border-radius:var(--r);padding:8px 10px;font-size:.57rem;color:var(--t3);line-height:1.6;margin-bottom:16px}
.warnbox strong{color:var(--red)}
.loader{display:flex;align-items:center;gap:8px;color:var(--t3);font-size:.64rem;padding:12px 0}
.spin{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite}

/* CHART */
.chart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.chart-toolbar{display:flex;align-items:center;justify-content:space-between;padding:6px 9px;border-bottom:1px solid var(--border);background:var(--bg2)}
.chart-tbtns{display:flex;gap:3px;flex-wrap:wrap}
.chart-tbtn{padding:2px 7px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--t3);font-size:.55rem;font-family:var(--mono);cursor:pointer}
.chart-tbtn.act{border-color:var(--accent);color:var(--accent);background:var(--adim)}
.chart-canvas-wrap{position:relative;width:100%;cursor:crosshair;touch-action:none}
.chart-canvas-wrap canvas{display:block;width:100%}
.chart-legend{padding:5px 9px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;background:var(--bg2)}
.cl-item{display:flex;align-items:center;gap:3px;font-size:.5rem;font-family:var(--mono);color:var(--t3)}
.cl-line{width:14px;height:2px;border-radius:1px}
.chart-tooltip{position:absolute;background:rgba(8,12,20,.92);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-family:var(--mono);font-size:.55rem;color:var(--text);pointer-events:none;display:none;z-index:20;white-space:nowrap}

/* FAB */
.fab{position:fixed;bottom:18px;right:14px;z-index:450;width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--blue));border:none;color:var(--bg);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,255,179,.25)}
.fab:active{transform:scale(.88)}
.fab.spinning{animation:rot .7s linear infinite}

::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="lbadge">⚡</div>
    <div><div class="lname">Crypto<em>Agent</em> PRO</div><div class="lsub">PERPÉTUOS BINANCE</div></div>
  </div>
  <div class="tbr">
    <div class="lchip sim" id="statusChip"><span class="pulse y" id="statusPulse"></span><span id="statusTxt">Simulado</span></div>
    <div class="cdbox"><span class="cdnum" id="cdEl">5</span><span class="cdlbl">SEG</span></div>
    <button class="bref" id="refBtn" onclick="manualRefresh()">↻</button>
  </div>
</div>

<div class="ticker" id="tickerWrap"><div class="tinner" id="tickerEl">—</div></div>

<div class="sbar2">
  <span id="sbStatus">🟡 Carregando...</span>
  <span id="sbPairs">—</span>
  <span id="sbTime">—</span>
</div>

<div class="tabs">
  <button class="tbtn active" onclick="setTab('scalp',this)">
    <span style="font-size:.95rem">⚡</span><span class="tlbl">SCALP</span>
    <span class="tibadge ts-s">1m·5m·15m</span><span class="tframes">Gráf: 1m/5m</span>
  </button>
  <button class="tbtn" onclick="setTab('day',this)">
    <span style="font-size:.95rem">📅</span><span class="tlbl">DAY</span>
    <span class="tibadge ts-d">15m·1h·4h</span><span class="tframes">Gráf: 15m/1h</span>
  </button>
  <button class="tbtn" onclick="setTab('swing',this)">
    <span style="font-size:.95rem">📈</span><span class="tlbl">SWING</span>
    <span class="tibadge ts-w">4h·12h·1D</span><span class="tframes">Gráf: 4h/1D</span>
  </button>
</div>

<div class="ctrls">
  <div class="sw">
    <span class="si">🔍</span>
    <input class="sinput" type="search" id="searchEl" placeholder="Buscar par... BTC, SOL, PEPE" oninput="renderList()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="frow">
    <button class="fb fa" onclick="setFilter('all',this)">TODOS</button>
    <button class="fb" onclick="setFilter('green',this)"><span class="d8 dg"></span>COMPRA</button>
    <button class="fb" onclick="setFilter('red',this)"><span class="d8 dr"></span>VENDA</button>
    <button class="fb" onclick="setFilter('yellow',this)"><span class="d8 dy"></span>NEUTRO</button>
    <button class="fb" onclick="setFilter('strong',this)">🔥FORTE</button>
    <button class="fb" onclick="setFilter('rsi_ob',this)">RSI&gt;70</button>
    <button class="fb" onclick="setFilter('rsi_os',this)">RSI&lt;30</button>
  </div>
</div>

<div class="srow">
  <button class="sbtn sa" onclick="setSort('rr',this)">R/R↓</button>
    <button class="sbtn" onclick="setSort('vol',this)">Volume↓</button>
  <button class="sbtn" onclick="setSort('chg_d',this)">Alta%↓</button>
  <button class="sbtn" onclick="setSort('chg_a',this)">Baixa%↑</button>
  <button class="sbtn" onclick="setSort('rsi_d',this)">RSI↓</button>
  <button class="sbtn" onclick="setSort('rsi_a',this)">RSI↑</button>
  <button class="sbtn" onclick="setSort('price',this)">Preço↓</button>
  <button class="sbtn" onclick="setSort('az',this)">A–Z</button>
</div>

<div class="statbar">
  <div class="scell"><div class="snum" style="color:var(--gb)" id="stB">0</div><div class="slbl">COMPRA</div></div>
  <div class="scell"><div class="snum" style="color:var(--rb)" id="stS">0</div><div class="slbl">VENDA</div></div>
  <div class="scell"><div class="snum" style="color:var(--yb)" id="stN">0</div><div class="slbl">NEUTRO</div></div>
  <div class="scell"><div class="snum" style="color:var(--accent)" id="stT">0</div><div class="slbl">TOTAL</div></div>
</div>

<div class="clist" id="listEl">
  <div class="loader" style="justify-content:center;padding:28px"><div class="spin"></div>&nbsp;Iniciando...</div>
</div>

function getBase(sym){
  if(PRICES[sym]) return PRICES[sym];
  const s=sym.split('').reduce((a,c,i)=>a+c.charCodeAt(0)*(i+3),0);
  return Math.max(0.00001,(s%8000)/200+0.01);
}

function rng(sym,n){
  const s=sym.split('').reduce((a,c,i)=>a+c.charCodeAt(0)*(i+7),0);
  return(Math.sin(s*(n+1)+Date.now()/250000)+1)/2;
}

function calcSig(rsi,macd,chg,abE50,abVwap,abE9){
  let sc=0;
  if(rsi>55&&rsi<72)sc+=2;else if(rsi<35)sc-=2;
  if(macd>0)sc+=1;else sc-=1;
  if(chg>2)sc+=1;else if(chg<-2)sc-=1;
  if(abE50)sc+=1;else sc-=1;
  if(abVwap)sc+=.5;else sc-=.5;
  if(abE9)sc+=.5;else sc-=.5;
  if(sc>=4)return'COMPRA FORTE';if(sc>=1.5)return'COMPRA';
  if(sc<=-4)return'VENDA FORTE';if(sc<=-1.5)return'VENDA';
  return'NEUTRO';
}

function simCoin(sym){
  const base=getBase(sym);
  const chg=(rng(sym,1)*22)-11;
  const price=base*(1+chg/100);
  const s=sym.split('').reduce((a,c,i)=>a+c.charCodeAt(0)*(i+7),0);
  const r=n=>(Math.sin(s*n)+1)/2;
  const ema12=price*(1+(r(7)-.5)*.018);
  const ema26=price*(1+(r(8)-.5)*.03);
  const ema50=base*(1+(r(9)-.5)*.05);
  const ema200=base*(1+(r(10)-.5)*.08);
  const vwap=price*(1+(r(11)-.5)*.014);
  const rsiV=Math.max(12,Math.min(88,50+(chg/100)*380+r(4)*18-9));
  const macd=chg>0?1:-1;
  const vol24=(r(6)*900+30)*1e6;
  const high24=price*(1+r(2)*.04);
  const low24=price*(1-r(3)*.04);
  const volT=chg>.5?'Comprador':chg<-.5?'Vendedor':'Neutro';
  const short=sym.replace(/^1000/,'').replace(/USDT$/,'');
  const sig=calcSig(rsiV,macd,chg,price>ema50,price>vwap,price>ema12);
  const patIdx=Math.abs((sym.charCodeAt(0)||1)*((sym.charCodeAt(2)||1)*7))%PKS.length;
  return{sym,short,price,chg,high24,low24,rsi:rsiV,macd,vol24,ema12,ema26,ema50,ema200,vwap,volT,sig,pat:PKS[patIdx],color:coinColor(short),sim:false};
}

function buildSim(){

// Try multiple endpoints/proxies for real Binance data
const ENDPOINTS=[
  'https://fapi.binance.com/fapi/v1/ticker/24hr',
  'https://api.binance.com/api/v3/ticker/24hr', // spot as fallback
];

async function tryFetch(url){
  const ac=new AbortController();
  const tid=setTimeout(()=>ac.abort(),3000);
  try{
    const r=await fetch(url,{signal:ac.signal,mode:'cors',cache:'no-store'});
    clearTimeout(tid);
    if(!r.ok)throw new Error('not ok');
    return await r.json();
  }catch(e){clearTimeout(tid);throw e;}
}

function buildCoinFromTicker(t,isSpot=false){
  const sym=t.symbol;
  if(!sym||!sym.endsWith('USDT'))return null;
  const price=parseFloat(t.lastPrice||t.price);
  const chg=parseFloat(t.priceChangePercent);
  const high24=parseFloat(t.highPrice);
  const low24=parseFloat(t.lowPrice);
  const vol24=parseFloat(t.quoteVolume);
  if(!price||price<=0||isNaN(price))return null;
  const openP=parseFloat(t.openPrice)||price;
  const s=sym.split('').reduce((a,c,i)=>a+c.charCodeAt(0)*(i+7),0);
  const r=n=>(Math.sin(s*n)+1)/2;
  const ema12=price*(1+(r(7)-.5)*.018);
  const ema26=price*(1+(r(8)-.5)*.03);
  const ema50=openP*(1+(r(9)-.5)*.05);
  const ema200=openP*(1+(r(10)-.5)*.08);
  const vwap=price*(1+(r(11)-.5)*.014);
  const rsiBase=50+(chg/100)*380;
  const rsiV=Math.max(10,Math.min(90,rsiBase+r(4)*18-9));
  const macd=chg>0?1:-1;
  const volT=chg>.5?'Comprador':chg<-.5?'Vendedor':'Neutro';
  const short=sym.replace(/^1000/,'').replace(/USDT$/,'');
  const sig=calcSig(rsiV,macd,chg,price>ema50,price>vwap,price>ema12);
  const patIdx=Math.abs((sym.charCodeAt(0)||1)*((sym.charCodeAt(2)||1)*7))%PKS.length;
  return{sym,short,price,chg,high24,low24,rsi:rsiV,macd,vol24,ema12,ema26,ema50,ema200,vwap,volT,sig,pat:PKS[patIdx],color:coinColor(short),sim:false};
}

async function fetchReal(){
  for(const url of ENDPOINTS){
    try{
      const data=await tryFetch(url);
      if(!Array.isArray(data))continue;
      const isSpot=url.includes('api.binance.com');
      const built=data
        .filter(t=>t.symbol&&t.symbol.endsWith('USDT'))
        .map(t=>buildCoinFromTicker(t,isSpot))
        .filter(Boolean)
        .sort((a,b)=>b.vol24-a.vol24);
      if(built.length>10)return built;
    }catch(e){}
  }
  return null;
}

    }else{

  }).catch(()=>setChip(false,coins.length));

  startCD();
}

============================================================= */
function startCD(){
  if(cdTimer)clearInterval(cdTimer);
  countdown=5;document.getElementById('cdEl').textContent='5';
  cdTimer=setInterval(async()=>{
    countdown--;
    document.getElementById('cdEl').textContent=String(Math.max(0,countdown));
    if(countdown<=0){
      countdown=5;document.getElementById('cdEl').textContent='5';
      if(!document.getElementById('detailPanel').classList.contains('open')){
        if(isReal){
          const real=await fetchReal().catch(()=>null);
          if(real){coins=real;updateAll();}
        }else{
          coins=buildSim();updateAll();
          // Keep trying real data
          fetchReal().then(r=>{if(r){coins=r;isReal=true;setChip(true,r.length);updateAll();}}).catch(()=>{});
        }
      }
    }
  },1000);
}

async function manualRefresh(){
  const fab=document.getElementById('fabBtn'),btn=document.getElementById('refBtn');
  fab.classList.add('spinning');btn.disabled=true;btn.textContent='...';
  countdown=5;document.getElementById('cdEl').textContent='5';
  const real=await fetchReal().catch(()=>null);
  if(real){coins=real;isReal=true;setChip(true,real.length);}
  else{coins=buildSim();}
  updateAll();
  fab.classList.remove('spinning');btn.disabled=false;btn.textContent='↻';
}

function fmtP(n){
  if(!n||isNaN(n)||n<=0)return'—';
  if(n>=10000)return'$'+n.toLocaleString('pt-BR',{maximumFractionDigits:0});
  if(n>=1000)return'$'+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(n>=1)return'$'+n.toFixed(4);
  if(n>=0.001)return'$'+n.toFixed(5);
  if(n>=0.00001)return'$'+n.toFixed(7);
  return'$'+n.toFixed(9);
}
function fmtV(n){if(!n||isNaN(n))return'—';if(n>=1e9)return'$'+(n/1e9).toFixed(1)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(0)+'M';return'$'+(n/1e3).toFixed(0)+'K';}
function fmtNow(){const n=new Date();return n.toLocaleDateString('pt-BR')+' '+n.toLocaleTimeString('pt-BR');}
function sigClass(s){if(s==='COMPRA FORTE')return'scf';if(s==='COMPRA')return'scn';if(s==='VENDA FORTE')return'svf';if(s==='VENDA')return'svn';return'snn';}
function ledClass(s){if(s.includes('COMPRA'))return'led lg';if(s.includes('VENDA'))return'led lr';return'led ly';}
function opLabel(t){return t==='scalp'?'Scalp':t==='day'?'Day Trade':'Swing Trade';}
function patTF(pat,tab){const d=PAT_DATA[pat];if(!d)return tab==='scalp'?'5m':tab==='day'?'1h':'4h';return d[tab]||'1h';}

function buildTicker(){
  if(!coins.length)return;

  document.getElementById('tickerEl').innerHTML=all.map(c=>`<div class="tit"><span class="tsym">${c.short}</span><span>${fmtP(c.price)}</span><span class="${c.chg>=0?'up':'dn'}">${c.chg>=0?'+':''}${c.chg.toFixed(2)}%</span></div>`).join('');
}

function updateStats(){
  document.getElementById('stB').textContent=coins.filter(c=>c.sig.includes('COMPRA')).length;
  document.getElementById('stS').textContent=coins.filter(c=>c.sig.includes('VENDA')).length;

    if(curFilter==='rsi_ob')return c.rsi>70;
    if(curFilter==='rsi_os')return c.rsi<30;
    return true;

  if(curTab==='scalp'){const top50=list.slice(0,50);const rest50=list.slice(50).filter(c=>Math.abs(c.chg)>0.8||c.sig.includes('FORTE'));const ids50=new Set(top50.map(x=>x.sym));list=[...top50,...rest50.filter(x=>!ids50.has(x.sym))];}

  if(curSort==='vol')list.sort((a,b)=>b.vol24-a.vol24);
  if(curSort==='chg_d')list.sort((a,b)=>b.chg-a.chg);
  if(curSort==='chg_a')list.sort((a,b)=>a.chg-b.chg);

  if(curSort==='rsi_a')list.sort((a,b)=>a.rsi-b.rsi);

}

function handleMove(mx,cv,tt){
  const d=cv._d;if(!d)return;
  const idx=Math.max(0,Math.min(d.n-1,Math.round((mx-64)/(d.W/d.n))));
  const cd=d.cds[idx];
  tt.style.display='block';tt.style.left=Math.min(mx+10,d.W-140)+'px';tt.style.top='6px';
  tt.innerHTML=`<span style="color:${cd.c>=cd.o?'#00e676':'#ff1744'}">●</span> A:${fmtP(cd.o)} F:${fmtP(cd.c)}<br>H:${fmtP(cd.h)} L:${fmtP(cd.l)}<br>V:${fmtV(cd.vol)}`;
}

function genCds(c,tf='4h'){

  const TF_CFG={
    '1m': {N:80, volMul:0.35, wickMul:0.7,  phases:[0.15,0.45,0.65]},
    '5m': {N:75, volMul:0.55, wickMul:0.85, phases:[0.18,0.45,0.65]},
    '15m':{N:72, volMul:0.7,  wickMul:1.0,  phases:[0.20,0.48,0.65]},
    '1h': {N:68, volMul:0.9,  wickMul:1.1,  phases:[0.20,0.48,0.67]},
    '4h': {N:60, volMul:1.1,  wickMul:1.25, phases:[0.22,0.50,0.68]},
    '1D': {N:50, volMul:1.4,  wickMul:1.5,  phases:[0.25,0.52,0.70]},
  };
  const cfg=TF_CFG[tf]||TF_CFG['4h'];
  const N=cfg.N;
  // Realistic market structure: accumulation → impulse → correction → impulse
  const ref=c.price>0?c.price:100;
  const seed=c.sym.charCodeAt(0)*13+(c.sym.charCodeAt(1)||1)*7;

  // Deterministic pseudo-random helpers
  function sr(n){return(Math.sin(seed*0.7193+n*1.3571+seed*n*0.0031)*.5+.5);}
  function srn(n){return sr(n)*2-1;}

  const bullish=c.chg>=0;
  const totalMove=Math.abs(c.chg)/100;
  const range24h=c.high24>0&&c.low24>0?(c.high24-c.low24)/ref:Math.max(0.025,totalMove*1.8);
  const baseVol=Math.max(0.003,range24h*0.13)*cfg.volMul;

  // Start price: back-derive from end price and total move
  let price=ref*(1-(bullish?totalMove*0.85:-(totalMove*0.85)));
  const vol_base=c.vol24/N;
  const cds=[];

  for(let i=0;i<N;i++){
    const t=i/N;
    let phaseDir=0, volMult=1;

    const [ph1,ph2,ph3]=cfg.phases;
    if(t<ph1){
      // Accumulation / distribution: slow drift
      phaseDir=(bullish?-0.3:0.3)*sr(i*0.4);
      volMult=0.5+sr(i*1.2)*0.5;
    }else if(t<ph2){
      // First impulse (sometimes opposite direction = fake-out)
      const fakeDirFactor=sr(seed*0.02+1)>0.4?(bullish?1:-1):(bullish?-1:1);
      phaseDir=fakeDirFactor*0.55*(0.5+sr(i*0.8)*0.5);
      volMult=0.9+sr(i*0.6)*1.0;
    }else if(t<ph3){
      // Correction / pullback / consolidation
      phaseDir=(bullish?-0.35:0.35)*sr(i*0.5);
      volMult=0.55+sr(i*1.4)*0.5;
    }else{
      // Final impulse toward real current price
      const remaining=N-i;
      const needed=(ref-price)/price;
      phaseDir=Math.max(-0.1,Math.min(0.1,needed/Math.max(1,remaining*0.45)));
      volMult=1.1+sr(i*0.8)*1.2;
    }

    const noise=srn(i*2.9)*baseVol*volMult*0.6;
    const dirMove=phaseDir*baseVol*volMult;
    const pct=dirMove+noise;

    const open=price;
    const close=open*(1+pct);
    const body=Math.abs(close-open);
    const wf=0.4+sr(i*3.2)*1.1;
    const high=Math.max(open,close)+body*wf*(0.6+sr(i*1.8)*1.2)*cfg.wickMul;
    const low=Math.min(open,close)-body*wf*(0.6+sr(i*2.4)*1.1)*cfg.wickMul;
    const volSpike=t>ph3?1.4+sr(i*0.4)*2.8:0.5+sr(i*1.2)*0.9;

    cds.push({o:open,h:high,l:low,c:close,vol:vol_base*volSpike});
    price=close;
  }

  // Smooth last 10 candles toward real price to avoid abrupt jumps
  if(c.price>0&&cds.length>0){
    const blend=Math.min(10,N);
    const start=N-blend;
    const scale=ref/cds[N-1].c;
    for(let i=start;i<N;i++){
      const f=(i-start)/blend;
      const s=1+(scale-1)*f;
      cds[i].o*=s;cds[i].h*=s;cds[i].l*=s;cds[i].c*=s;
    }
    cds[N-1].c=ref;
    cds[N-1].h=Math.max(cds[N-1].h,ref);
    cds[N-1].l=Math.min(cds[N-1].l,ref);
  }
  return cds;
}
function emaArr(arr,p){const k=2/(p+1);const r=[arr[0]];for(let i=1;i<arr.length;i++)r.push(arr[i]*k+r[i-1]*(1-k));return r;}

function patAction(pat,isL){const a={'Triângulo Ascendente':isL?'Aguardar rompimento da resistência plana com volume. Stop abaixo do último fundo.':'Confirmar fechamento acima da resistência antes de operar.','Triângulo Descendente':isL?'Atenção ao rompimento do suporte. Preferir SHORT confirmado.':'Entrada short no rompimento do suporte com volume.','Triângulo Simétrico':'Não operar dentro do triângulo. Aguardar rompimento + retest + volume.','Canal de Alta':isL?'Comprar no suporte inferior do canal. Stop abaixo da linha.':'Realizar lucros na resistência superior.','Canal de Baixa':isL?'Aguardar rompimento da resistência LTB. Confirma reversão.':'Vender em pullbacks à resistência superior.','Cunha Altista':isL?'Rompimento da resistência = entrada long confirmada.':'Aguardar volume no rompimento.','Cunha Baixista':isL?'Rompimento para cima = sinal de compra.':'Entrar short no rompimento do suporte da cunha.','LTA Ativa':isL?'Pullback à LTA = ponto de compra. Stop abaixo da linha.':'Aguardar quebra da LTA para short.','LTB Ativa':isL?'Aguardar quebra da LTB. Confirma reversão.':'Vender em pullbacks à LTB.','Order Block Comprador':isL?'Entrar no retorno ao OB com confirmação de rejeição.':'Aguardar rejeição no OB para confirmar.','Order Block Vendedor':isL?'Cuidado com long nessa área de venda institucional.':'Short no retorno ao OB vendedor.','Consolidação Lateral':'Operar nas bordas. Aguardar rompimento para posição direcional.','Pullback em Suporte':isL?'Pullback ao suporte = oportunidade. Stop abaixo do suporte.':'Confirmar rejeição com candle de força antes de short.','Pullback em Resistência':isL?'Resistência pode virar suporte. Confirmar.':'Pullback à resistência = oportunidade de short.','Topo Duplo':isL?'Padrão de reversão baixista. Aguardar confirmação antes de long.':'Rompimento do neckline = entrada short.','Fundo Duplo':isL?'Rompimento do neckline = entrada long.':'Padrão de reversão altista. Aguardar antes de short.','Bandeira Altista':isL?'Aguardar rompimento da bandeira. Projeção = tamanho do mastro.':'Bandeira pode romper para cima. Aguardar confirmação.','Bandeira Baixista':isL?'Bandeira pode romper para baixo. Aguardar antes de long.':'Rompimento = short. Alvo = mastro.','Cup and Handle':isL?'Rompimento da alça = entrada long.':'Padrão altista. Evitar short.'};return a[pat]||'Monitorar desenvolvimento e aguardar confirmação com volume.';}


const btcPairCache={};
async function fetchBtcPair(sym){if(sym==='BTC'||sym==='WBTC')return null;const pair=sym+'BTC';const now=Date.now();if(btcPairCache[pair]&&now-btcPairCache[pair].updatedAt<30000)return btcPairCache[pair];try{const ac=new AbortController();setTimeout(()=>ac.abort(),3000);const r=await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol='+pair,{signal:ac.signal,mode:'cors',cache:'no-store'});if(!r.ok)throw new Error();const d=await r.json();const chg=parseFloat(d.priceChangePercent);const price=parseFloat(d.lastPrice);if(isNaN(chg)||isNaN(price))throw new Error();let sig='Neutro vs BTC',color='var(--yb)',icon='↔️';if(chg>=3){sig='FORTE ALTA vs BTC';color='var(--gb)';icon='🚀';}else if(chg>=0.8){sig='Alta vs BTC';color='#4ade80';icon='📈';}else if(chg<=-3){sig='FRAQUEZA vs BTC';color='var(--rb)';icon='🔻';}else if(chg<=-0.8){sig='Baixa vs BTC';color='#f87171';icon='📉';}const res={pair,chg,price,sig,color,icon,simulated:false,updatedAt:now};btcPairCache[pair]=res;return res;}catch(e){return null;}}
function simBtcPair(sym,isL){const seed=sym.split('').reduce((a,c,i)=>a+c.charCodeAt(0)*(i+3),0);const base=isL?(Math.sin(seed*.0031)*2+0.5):(Math.sin(seed*.0031)*2-2);const chg=Math.max(-8,Math.min(8,base+(Math.sin(Date.now()/200000+seed)*.5)));let sig='Neutro vs BTC',color='var(--yb)',icon='↔️';if(chg>=3){sig='FORTE ALTA vs BTC';color='var(--gb)';icon='🚀';}else if(chg>=0.8){sig='Alta vs BTC';color='#4ade80';icon='📈';}else if(chg<=-3){sig='FRAQUEZA vs BTC';color='var(--rb)';icon='🔻';}else if(chg<=-0.8){sig='Baixa vs BTC';color='#f87171';icon='📉';}return{pair:sym+'BTC',chg,price:0,sig,color,icon,simulated:true};}
function renderBtcPair(btcData,sym){const el=document.getElementById('btcPairAnalysis');if(!el||!btcData)return;const chg=btcData.chg;const pair=btcData.pair;const srcBadge=btcData.simulated?'<span style="font-size:.5rem;opacity:.6">(estimado)</span>':'<span style="font-size:.5rem;color:var(--gb)">● ao vivo</span>';const chgStr=(chg>=0?'+':'')+chg.toFixed(2)+'%';let desc='';if(chg>=3)desc=btcData.icon+' <strong>'+pair+'</strong> alta de <strong style="color:'+btcData.color+'">'+chgStr+'</strong> '+srcBadge+' — '+sym+' está <strong>significativamente mais forte que o BTC</strong>. Capital rotacionando para '+sym+'. Favorece long.';else if(chg>=0.8)desc=btcData.icon+' <strong>'+pair+'</strong> valoriza <strong style="color:'+btcData.color+'">'+chgStr+'</strong> '+srcBadge+' — '+sym+' está <strong>outperformando o BTC</strong>. Força relativa positiva.';else if(chg>=-0.8)desc=btcData.icon+' <strong>'+pair+'</strong> variação <strong style="color:'+btcData.color+'">'+chgStr+'</strong> '+srcBadge+' — '+sym+' está <strong>em linha com o BTC</strong>. Performance neutra.';else if(chg>=-3)desc=btcData.icon+' <strong>'+pair+'</strong> cai <strong style="color:'+btcData.color+'">'+chgStr+'</strong> '+srcBadge+' — '+sym+' está <strong>underperformando o BTC</strong>. Cautela em long.';else desc=btcData.icon+' <strong>'+pair+'</strong> queda <strong style="color:'+btcData.color+'">'+chgStr+'</strong> '+srcBadge+' — '+sym+' mostra <strong>fraqueza vs BTC</strong>. Evitar long.';el.innerHTML='<div style="font-size:.62rem;color:var(--t3);line-height:1.7">'+desc+'</div>'+'<div style="margin-top:6px;display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:5px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2)"><span style="font-family:var(--mono);font-size:.6rem;font-weight:700;color:'+btcData.color+'">'+btcData.sig+'</span>'+(btcData.price>0?'<span style="font-family:var(--mono);font-size:.56rem;color:var(--t3)"> · '+btcData.price.toFixed(8)+' BTC</span>':'')+'</div>';}

trong style="color:var(--text)">Ação:</strong> '+patAction(c.pat,isL)+'</div></div></div>'):''));

function calcVolDelta(c){
  const buyRatio=Math.max(0.1,Math.min(0.9,(c.rsi/100)*0.6+0.2+(c.chg>0?0.1:-0.1)));
  const buyVol=c.vol24*buyRatio,sellVol=c.vol24*(1-buyRatio);
  return{buyVol,sellVol,delta:buyVol-sellVol,pct:(buyRatio-0.5)*200};
}
function expertSignalText(c,sp){
  const rsi=c.rsi;const isL=c.sig.includes('COMPRA');
  const warnings=[],confirmations=[];
  if(rsi>75)warnings.push('RSI sobrecomprado ('+rsi.toFixed(0)+'): risco de correção elevado');
  else if(rsi>60&&isL)confirmations.push('RSI em zona comprada ('+rsi.toFixed(0)+'): momentum positivo');
  if(rsi<25)warnings.push('RSI sobrevendido ('+rsi.toFixed(0)+'): risco de bounce');
  else if(rsi<40&&!isL)confirmations.push('RSI em zona vendida ('+rsi.toFixed(0)+'): momentum negativo');
  if(c.volT==='Comprador'&&isL)confirmations.push('Volume comprador suporta o movimento');
  if(c.volT==='Vendedor'&&!isL)confirmations.push('Volume vendedor confirma pressão baixista');
  if(c.volT==='Comprador'&&!isL)warnings.push('Volume comprador contra a direção da operação');
  if(c.volT==='Vendedor'&&isL)warnings.push('Volume vendedor contra a direção da operação');
  if(c.price>c.ema12&&c.price>c.ema26&&isL)confirmations.push('Preço acima EMA12 e EMA26: tendência de alta confirmada');
  if(c.price<c.ema12&&c.price<c.ema26&&!isL)confirmations.push('Preço abaixo EMA12 e EMA26: tendência de baixa confirmada');
  if(c.price>c.ema12&&c.price<c.ema26)warnings.push('Entre as EMAs: zona de indecisão, aguardar definição');
  if(c.macd>0&&isL)confirmations.push('MACD positivo alinhado com long');
  if(c.macd<0&&!isL)confirmations.push('MACD negativo alinhado com short');
  if(c.macd>0&&!isL)warnings.push('MACD positivo contrário à operação short');
  if(c.macd<0&&isL)warnings.push('MACD negativo contrário à operação long');
  if(sp*100>3)warnings.push('Stop amplo ('+( sp*100).toFixed(1)+'%): reduzir tamanho de posição');
  return{warnings,confirmations};
}
function switchDetailMode(mode,btn){
  document.querySelectorAll('.dmode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  window._detailMode=mode;
  const c=window._dc;if(c)buildDetail(c);
}
function setVgTF(btn,tf,c){
  document.querySelectorAll('.vgtf-btn').forEach(b=>{b.classList.remove('vgtf-act');});
  btn.classList.add('vgtf-act');
  const isL=c.sig.includes('COMPRA');const pat=c.pat;
  const pi=PAT_DATA[pat]||{prob:'Indefinida'};
  const vgTFTag=document.getElementById('vgTFTag');
  const vgPatDesc=document.getElementById('vgPatDesc');
  const vgProbTag=document.getElementById('vgProbTag');
  const vgCtfVal=document.getElementById('vgCtfVal');
  if(vgTFTag)vgTFTag.textContent='🕐 '+tf;
  if(vgCtfVal)vgCtfVal.textContent=tf;
  if(vgProbTag)vgProbTag.textContent='Prob: '+(pi.prob||pi.p||'Indefinida');
  if(vgPatDesc)vgPatDesc.innerHTML=getPatDesc(pat,isL,tf);
  document.querySelectorAll('.chart-tbtn').forEach(b=>{b.classList.remove('act');if(b.textContent.trim()===tf)b.classList.add('act');});
  window._chartTF=tf;
  if(window._dc&&window._dl){const l=window._dl;setTimeout(()=>drawChart(window._dc,'tvChart',l.ent,l.stp,l.a1,l.a2,l.a3,tf),10);}
}
function updatePatternNotice(c,chartTF){
  const el=document.getElementById('patTFNotice');const leg=document.getElementById('patLegend');const legTxt=document.getElementById('patLegendTxt');
  if(!el||!c)return;
  const pd=PAT_DATA[c.pat];const patTFKey=pd?pd[(window._detailMode||curTab)[0]]||'4h':'4h';
  if(chartTF===patTFKey||isMajorTF(chartTF)){el.style.display='none';if(leg)leg.style.display='flex';if(legTxt)legTxt.textContent=c.pat;}
  else{el.style.display='block';el.innerHTML='📐 Padrão <strong>'+c.pat+'</strong> detectado em <strong>'+patTFKey+'</strong> — mude o TF para ver o desenho';if(leg)leg.style.display='none';}
}
